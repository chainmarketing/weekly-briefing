name: Media Monitor — Validate & Remind

on:
  push:
    branches: [main]
    paths:
      - 'workflow/**'
  pull_request:
    paths:
      - 'workflow/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Validate syntax
        run: python -m py_compile workflow/workflow.py

      - name: Check migration rules
        run: |
          echo "Checking for common regressions..."
          # Bare requests.get/post without create_session — will bypass egress proxy
          if grep -n 'requests\.get\|requests\.post' workflow/workflow.py | grep -v create_session | grep -v '#' | grep -v 'import'; then
            echo "❌ FAIL: Found bare requests.get/post calls. Use create_session().get/post instead."
            exit 1
          fi
          # os.environ.get — should use skills_core context.get
          if grep -n 'os\.environ\.get' workflow/workflow.py; then
            echo "❌ FAIL: Found os.environ.get(). Use context.get() from skills_core instead."
            exit 1
          fi
          # Legacy skills.chainalysis imports
          if grep -n 'from skills\.' workflow/workflow.py; then
            echo "❌ FAIL: Found legacy skills.* import. Use chainalysis_skill_* packages."
            exit 1
          fi
          echo "✅ All migration checks passed."

      - name: Deploy reminder
        if: github.event_name == 'push'
        run: |
          echo "::notice::Workflow source updated. Deploy to Chainalysis Workflows via Chain:"
          echo "::notice::Ask Chain to deploy media-monitor from the repo."
