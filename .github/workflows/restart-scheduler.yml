name: Restart Media Monitor Scheduler

on:
  schedule:
    # Every day at 06:00 UTC — scheduler runs for ~22.5h from here
    - cron: '0 6 * * *'
  workflow_dispatch:  # Manual trigger button

jobs:
  restart-scheduler:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke scheduler via Workflows API
        env:
          WORKFLOWS_API_TOKEN: ${{ secrets.WORKFLOWS_API_TOKEN }}
        run: |
          echo "Invoking media-monitor-scheduler..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.workflows.chainalysis.com/workflow/media-monitor-scheduler/invoke" \
            -H "Authorization: Bearer $WORKFLOWS_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"inputPayload": {}}')
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          
          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Scheduler invoke failed with HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "✅ Scheduler started successfully"
