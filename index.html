<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weekly Briefing Archive</title>
    <style>
      :root {
        --bg: #f8f9fa;
        --card: #ffffff;
        --text: #1a1a2e;
        --text-muted: #6b7280;
        --border: #e5e7eb;
        --primary: #1a73e8;
        --success: #16a34a;
        --warning: #d97706;
        --danger: #dc2626;
        --info: #2563eb;
        --chart-us: #1a73e8;
        --chart-comp: #f57c00;
        --chart-mainstream: #1a73e8;
        --chart-crypto: #7c3aed;
        --chart-fintech: #0891b2;
        --chart-blog: #d97706;
        --chart-niche: #9ca3af;
        --chart-pos: #16a34a;
        --chart-neu: #9ca3af;
        --chart-neg: #dc2626;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111118;
          --card: #1c1c27;
          --text: #e4e4e7;
          --text-muted: #9ca3af;
          --border: #2e2e3a;
          --primary: #60a5fa;
          --success: #4ade80;
          --warning: #fbbf24;
          --danger: #f87171;
          --info: #60a5fa;
          --chart-us: #60a5fa;
          --chart-comp: #fbbf24;
          --chart-mainstream: #60a5fa;
          --chart-crypto: #a78bfa;
          --chart-fintech: #22d3ee;
          --chart-blog: #fbbf24;
          --chart-niche: #6b7280;
          --chart-pos: #4ade80;
          --chart-neu: #6b7280;
          --chart-neg: #f87171;
        }
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        line-height: 1.6;
        min-height: 100vh;
      }
      .container { max-width: 900px; margin: 0 auto; padding: 40px 16px; }
      h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
      h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
      .subtitle { font-size: 13px; color: var(--text-muted); }
      .text-center { text-align: center; }
      a { color: var(--primary); text-decoration: none; }
      a:hover { text-decoration: underline; }
      .footer { text-align: center; font-size: 11px; color: var(--text-muted); padding: 20px 0 40px; }

      /* Briefing cards */
      .briefing-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 14px;
        transition: border-color 0.2s;
        cursor: pointer;
        text-decoration: none;
        display: block;
        color: var(--text);
      }
      .briefing-card:hover { border-color: var(--primary); text-decoration: none; }
      .briefing-card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; flex-wrap: wrap; gap: 8px; }
      .briefing-date { font-size: 15px; font-weight: 600; }
      .briefing-stats { display: flex; gap: 14px; font-size: 12px; color: var(--text-muted); }
      .briefing-stat strong { color: var(--text); font-weight: 600; }
      .briefing-headline { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
      .briefing-narratives { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
      .narrative-tag {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 99px;
        background: rgba(37, 99, 235, 0.08);
        color: var(--info);
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="container">

      <div class="text-center" style="margin-bottom: 24px;">
        <h1>📋 Weekly Briefing Archive</h1>
        <p class="subtitle" style="margin-top: 4px;">All past Chainalysis media briefings — click any week to view the full briefing.</p>
      </div>

      <div id="briefing-list"></div>

      <div class="footer">Chainalysis Weekly Briefing Archive</div>
    </div>

    <script>
      async function init() {
        let data;
        try {
          const resp = await fetch('data/weekly-data.json');
          data = await resp.json();
        } catch (e) {
          document.getElementById('briefing-list').innerHTML =
            '<p style="text-align:center;color:var(--text-muted);padding:40px;">Could not load briefing data.</p>';
          return;
        }
        data.sort((a, b) => b.date.localeCompare(a.date));
        renderBriefingList(data);
      }

      function fmtDate(d) {
        return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      }

      function renderBriefingList(data) {
        const el = document.getElementById('briefing-list');
        if (!data.length) {
          el.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">No briefings yet.</p>';
          return;
        }
        let html = '<h2 style="margin-top:8px;">All Briefings</h2>';
        for (const week of data) {
          const tags = (week.narratives || []).slice(0, 3).map(n =>
            `<span class="narrative-tag">${n.length > 40 ? n.slice(0, 40) + '…' : n}</span>`
          ).join('');

          html += `<a href="${week.url}" class="briefing-card">
            <div class="briefing-card-header">
              <span class="briefing-date">Week of ${fmtDate(week.date)}</span>
              <div class="briefing-stats">
                <span class="briefing-stat" title="Our mentions"><strong style="color:var(--primary)">${week.mentions}</strong> mentions</span>
                <span class="briefing-stat" title="Competitor articles"><strong style="color:var(--warning)">${week.competitor_total}</strong> competitor</span>
                <span class="briefing-stat" title="Total articles analysed by the workflow">${week.articles_analysed.toLocaleString()} analysed</span>
              </div>
            </div>
            <div class="briefing-headline">${week.headline || ''}</div>
            ${tags ? `<div class="briefing-narratives">${tags}</div>` : ''}
          </a>`;
        }
        el.innerHTML = html;
      }

      init();
    </script>
  </body>
</html>
